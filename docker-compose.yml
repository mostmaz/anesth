version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: icu_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: icu_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: icu_server_prod
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-postgres}@db:5432/icu_db?schema=public
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-fallback_secret_for_dev_only}
    ports:
      - "3001:3001"
    depends_on:
      - db

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:3001/api}
    container_name: icu_client_prod
    restart: always
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  postgres_data:
